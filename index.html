<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Chamador de Senhas</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}
.tv {
  background:#0d1b2a;
  color:white;
  height:100vh;
  text-align:center;
  padding-top:80px;
}
.titulo { font-size:36px; }
.tipo { font-size:48px; color:#ffcc00; }
.senha { font-size:130px; margin:30px 0; }
.guiche { font-size:42px; }
.painel { padding:30px; background:#f2f2f2; }
select, input, button {
  width:100%;
  font-size:18px;
  padding:12px;
  margin-bottom:15px;
}
button { background:#0077b6; color:white; border:none; }
</style>
</head>

<body>
<div id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, set, onValue }
  from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDOgoxatsS-a7dgXpVPpPHiT6d7ZWpU",
  authDomain: "chamador-senha-censo.firebaseapp.com",
  databaseURL: "https://chamador-senha-censo-default-rtdb.firebaseio.com",
  projectId: "chamador-senha-censo",
  storageBucket: "chamador-senha-censo.appspot.com",
  messagingSenderId: "445582190803",
  appId: "1:445582190803:web:8b45d608b544122d6cc26"
};

const appFB = initializeApp(firebaseConfig);
const db = getDatabase(appFB);
const senhaRef = ref(db,"senhaAtual");

const isTV = location.search.includes("tv");
const app = document.getElementById("app");

if(isTV){
  app.innerHTML = `
    <div class="tv">
      <div class="titulo">Chamador de Senhas</div>
      <div class="tipo" id="tipo">---</div>
      <div class="senha" id="senha">000</div>
      <div class="guiche" id="guiche">---</div>
    </div>
  `;
}else{
  app.innerHTML = `
    <div class="painel">
      <select id="tipo">
        <option>Exames</option>
        <option>Prioridade</option>
      </select>
      <input id="numero" type="number" placeholder="Número">
      <select id="guiche">
        <option>Guichê 1</option>
        <option>Guichê 2</option>
      </select>
      <button onclick="chamar()">Chamar</button>
    </div>
  `;
}

window.chamar = () => {
  set(senhaRef,{
    tipo: tipo.value,
    numero: Number(numero.value),
    guiche: guiche.value
  });
};

onValue(senhaRef,s=>{
  if(!isTV || !s.exists()) return;
  const d = s.val();
  tipo.innerText = d.tipo;
  senha.innerText = String(d.numero).padStart(3,"0");
  guiche.innerText = d.guiche;
});
</script>

</body>
</html>
``
